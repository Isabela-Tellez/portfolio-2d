<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Isabela Dev Portfolio</title>

    <!-- Carga de Phaser desde su CDN oficial -->

    <style>
        body {
            margin: 0;
            background-color: #1a1a1a;
            display: flex;

            overflow: hidden;
